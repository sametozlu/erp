services:
  staff_planner:
    build: .
    container_name: staff_planner
    ports:
      - "8890:5000"
    environment:
      - TZ=Europe/Istanbul
      - DB_URL=sqlite:////app/instance/planner.db
      # - MAX_CONTENT_LENGTH_MB=100
      # - UPLOADS_PUBLIC=0
      # - PUBLIC_BASE_URL=https://example.com
      # - SOCKETIO_CORS_ORIGINS=https://example.com
    volumes:
      # Veritabanını kalıcı tutmak için instance klasörü mount
      - ./instance:/app/instance
    restart: unless-stopped
