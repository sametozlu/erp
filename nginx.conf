# Nginx HTTPS Reverse Proxy Konfigürasyonu
# Staff Planner için HTTPS desteği

events {
    worker_connections 1024;
}

http {
    # Upstream olarak Flask uygulaması
    upstream staff_planner {
        server staff_planner:5000;
    }

    # HTTP'den HTTPS'e yönlendirme
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS sunucu
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL Sertifikaları
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        
        # SSL Ayarları
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

        # Genel ayarlar
        client_max_body_size 100M;

        # Ana uygulama
        location / {
            proxy_pass http://staff_planner;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeout ayarları
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Socket.IO WebSocket bağlantıları
        location /socket.io {
            proxy_pass http://staff_planner/socket.io;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket için uzun timeout
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Statik dosyalar için cache
        location /static {
            proxy_pass http://staff_planner/static;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Yüklemeler
        location /uploads {
            proxy_pass http://staff_planner/uploads;
            expires 1d;
        }
    }
}
