{% extends "base.html" %}
{% block content %}
<section class="card" style="max-width: 1100px; margin: 0 auto;">
  <div class="rowline" style="justify-content:space-between; gap:10px; flex-wrap:wrap;">
    <div>
      <h2 style="margin:0;">Mesaj Merkezi</h2>
      <div class="hint" style="margin-top:4px;">
        Kullanıcı seçimi: Sohbet mesajı · Ekip/Genel: Duyuru akışı
      </div>
    </div>
    <div class="rowline" style="gap:8px;">
      <a class="btn secondary" href="{{ url_for('chat.chat_page') }}" style="text-decoration:none;">Sohbet</a>
      <a class="btn secondary" href="{{ url_for('chat.announcements_page') }}" style="text-decoration:none;">Duyurular</a>
    </div>
  </div>

  <form method="post" style="margin-top:14px; display:grid; gap:10px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label>Hedef Türü
      <select name="target_type" id="msgTargetType">
        <option value="user">Kullanıcı (Sohbet)</option>
        <option value="team">Ekip (Duyuru)</option>
        <option value="all">Genel (Duyuru)</option>
      </select>
    </label>

    <label id="msgUserWrap">Kullanıcı
      <select name="to_user_id">
        {% for u in users %}
          {% if u.id != user.id %}
            <option value="{{ u.id }}">{{ u.full_name or u.email or u.username }}</option>
          {% endif %}
        {% endfor %}
      </select>
    </label>

    <label id="msgTeamWrap" style="display:none;">Ekip
      <select name="team_id">
        {% for t in teams %}
          <option value="{{ t.id }}">{{ t.name }}</option>
        {% endfor %}
      </select>
    </label>

    <label id="msgTitleWrap" style="display:none;">Başlık (opsiyon)
      <input type="text" name="title" maxlength="200" placeholder="Duyuru başlığı">
    </label>

    <label id="msgPopupWrap" style="display:none;">
      <input type="checkbox" name="is_popup" value="1">
      Popup olarak göster
      <div class="hint" style="margin-top:4px;">Güncelleme notu gibi kullanıcıların ilk açılışta görmesi için.</div>
    </label>


    <label>Mesaj
      <textarea name="message" rows="4" maxlength="2000" placeholder="Mesaj yaz..."></textarea>
    </label>

    <div class="rowline" style="gap:10px; justify-content:flex-start;">
      <button class="btn" type="submit" style="background:var(--text-strong); color:white; border:none;">Gönder</button>
      <a class="btn secondary" href="{{ url_for('planner.plan_week') }}" style="text-decoration:none;">Plan</a>
    </div>
  </form>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('msgTargetType');
  const userWrap = document.getElementById('msgUserWrap');
  const teamWrap = document.getElementById('msgTeamWrap');
  const titleWrap = document.getElementById('msgTitleWrap');
  const popupWrap = document.getElementById('msgPopupWrap');
  const apply = () => {
    const v = (sel ? sel.value : '').toLowerCase();
    if(userWrap) userWrap.style.display = (v === 'user') ? '' : 'none';
    if(teamWrap) teamWrap.style.display = (v === 'team') ? '' : 'none';
    if(titleWrap) titleWrap.style.display = (v === 'team' || v === 'all') ? '' : 'none';
    if(popupWrap) popupWrap.style.display = (v === 'team' || v === 'all') ? '' : 'none';
  };
  if(sel){
    sel.addEventListener('change', apply);
    apply();
  }
});
</script>
{% endblock %}
